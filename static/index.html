<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI VC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .vc-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .vc-card .prose { font-size: 0.875rem; line-height: 1.6; color: #334155; }
    .vc-card .prose p { margin-bottom: 0.5rem; }
    .vc-card .prose ul, .vc-card .prose ol { padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .vc-card .prose li { margin-bottom: 0.2rem; }
    .vc-card .prose h1,.vc-card .prose h2,.vc-card .prose h3 { font-weight: 600; margin: 0.5rem 0 0.25rem; }
    .vc-card .prose strong { font-weight: 600; }
    .vc-card .prose code { background: #f1f5f9; padding: 0.1em 0.3em; border-radius: 0.25rem; font-size: 0.8em; }
    .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Copy button on cards */
    .copy-btn { opacity: 0; transition: opacity .15s; }
    .vc-card:hover .copy-btn { opacity: 1; }

    /* Print styles */
    @media print {
      header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #input-section { display: none !important; }
      .no-print { display: none !important; }
      #sidebar { display: none !important; }
      .vc-card { break-inside: avoid; page-break-inside: avoid; }
      body { background: white; display: block !important; height: auto !important; }
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      flex-shrink: 0;
      background: #0a1020;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    #sidebar.collapsed { width: 0; min-width: 0; }
    #main-wrapper { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }

    .history-date-group {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3d6b4a;
      padding: 12px 12px 4px;
      white-space: nowrap;
    }
    .history-item {
      padding: 9px 12px;
      border-radius: 7px;
      cursor: pointer;
      color: #6ee7b7;
      font-size: 13px;
      line-height: 1.4;
      position: relative;
      transition: background 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin: 1px 4px;
    }
    .history-item:hover { background: rgba(16,185,129,0.12); }
    .history-item.active { background: rgba(16,185,129,0.18); color: #a7f3d0; }
    .history-item .item-text { display: block; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
    .history-del {
      opacity: 0;
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #34d399;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 5px;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    .history-item:hover .history-del { opacity: 1; }
    .history-del:hover { background: rgba(16,185,129,0.2); color: white; }
  </style>
</head>
<body class="bg-slate-50" style="display:flex;height:100vh;overflow:hidden;">

<!-- ── Sidebar ─────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <div style="padding:12px 8px 8px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;">
    <button onclick="newChat()" style="width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s;white-space:nowrap;" onmouseover="this.style.background='rgba(16,185,129,0.22)'" onmouseout="this.style.background='rgba(16,185,129,0.12)'">
      <svg style="width:14px;height:14px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      New Chat
    </button>
  </div>
  <div id="history-list" style="flex:1;overflow-y:auto;padding:4px 0 12px;"></div>
</aside>

<!-- ── Main wrapper ─────────────────────────────────────────────────── -->
<div id="main-wrapper" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;">

  <!-- Header -->
  <header class="bg-slate-900 text-white px-6 py-4 flex items-center gap-3 shadow-lg sticky top-0 z-20">
    <button onclick="toggleSidebar()" class="no-print flex-shrink-0 p-2 rounded-lg transition-colors" style="background:rgba(255,255,255,0.08);border:none;cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'" title="Toggle history">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-sm">$</div>
    <div>
      <h1 class="font-bold text-lg leading-tight">AI VC</h1>
      <p class="text-slate-400 text-xs">Khosla · Sequoia · a16z · Founders Fund</p>
    </div>
    <!-- Phase badge -->
    <div id="phase-badge" class="ml-auto hidden items-center gap-2 text-xs bg-slate-800 px-3 py-1.5 rounded-full text-slate-300">
      <span class="pulse-dot w-2 h-2 rounded-full bg-emerald-400 inline-block"></span>
      <span id="phase-text">Working…</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Input card -->
    <div id="input-section" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest mb-2">Your question or pitch</label>
      <textarea
        id="q"
        rows="3"
        class="w-full border border-slate-200 rounded-xl p-4 text-slate-800 text-base resize-none transition-all"
        placeholder="e.g. 'We're building AI-powered drug discovery for rare diseases. Seed stage, $2M ARR. Should we raise a Series A now?'"
      ></textarea>

      <!-- File attachment row -->
      <div class="mt-3">
        <label class="cursor-pointer inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-emerald-600 transition-colors select-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
          </svg>
          Attach files
          <input
            type="file" id="file-input" class="hidden"
            accept=".pdf,.txt,.md,.rtf,.png,.jpg,.jpeg,.gif,.webp"
            multiple
            onchange="fileSelected(this)"
          />
        </label>
        <div id="file-badges" class="flex flex-wrap gap-2 mt-2"></div>
      </div>

      <div class="flex items-center justify-between mt-4">
        <p class="text-xs text-slate-400">Five legendary VCs give their take, then debate each other.</p>
        <button
          id="submit-btn"
          onclick="askVCs()"
          class="bg-slate-900 hover:bg-slate-700 active:bg-slate-800 text-white font-semibold px-5 py-2.5 rounded-xl transition-colors flex items-center gap-2 text-sm"
        >
          Ask the VCs
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Round 1: Initial Takes -->
    <section id="sec-initial" class="hidden">
      <div class="flex items-baseline gap-3 mb-4">
        <h2 class="text-base font-bold text-slate-800">Initial Takes</h2>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Round 1</span>
      </div>
      <div class="flex flex-col gap-4">
        <div id="card-vinod-initial" class="vc-card"></div>
        <div id="card-doug-initial"  class="vc-card"></div>
        <div id="card-ben-initial"   class="vc-card"></div>
        <div id="card-peter-initial" class="vc-card"></div>
        <div id="card-pat-initial"   class="vc-card"></div>
      </div>
    </section>

    <!-- Round 2: Discussion -->
    <section id="sec-discuss" class="hidden">
      <div class="flex items-baseline gap-3 mb-4">
        <h2 class="text-base font-bold text-slate-800">Board Discussion</h2>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Round 2</span>
      </div>
      <div class="flex flex-col gap-4">
        <div id="card-vinod-discuss" class="vc-card"></div>
        <div id="card-doug-discuss"  class="vc-card"></div>
        <div id="card-ben-discuss"   class="vc-card min-h-[120px]"></div>
        <div id="card-peter-discuss" class="vc-card min-h-[120px]"></div>
        <div id="card-pat-discuss"   class="vc-card min-h-[120px]"></div>
      </div>
    </section>

    <!-- Result toolbar -->
    <div id="result-toolbar" class="hidden no-print items-center gap-2 pb-4">
      <button onclick="copyAll()" id="copy-all-btn"
        class="flex items-center gap-1.5 text-sm font-medium text-emerald-700 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 px-3.5 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
        </svg>
        Copy All
      </button>
      <button onclick="window.print()"
        class="flex items-center gap-1.5 text-sm font-medium text-slate-600 bg-white hover:bg-slate-50 border border-slate-200 px-3.5 py-2 rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
        </svg>
        Print
      </button>
    </div>

  </main>
</div><!-- end #main-wrapper -->

<script>
// ── Session state ────────────────────────────────────────────────────
const cardMd = {};  // formatted markdown for copying
let takes = {};     // raw VC takes (for saving)
let responses = {}; // raw VC responses (for saving)
let currentQuestion = '';
let currentFileNames = [];
let currentActiveId = null;

// ── Copy helpers ─────────────────────────────────────────────────────
function copyText(text, btnEl) {
  navigator.clipboard.writeText(text).then(() => {
    if (!btnEl) return;
    const orig = btnEl.innerHTML;
    btnEl.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`;
    setTimeout(() => { btnEl.innerHTML = orig; }, 1800);
  });
}

function copyAll() {
  const btn = document.getElementById('copy-all-btn');
  const sections = [
    { title: '# Initial Takes', keys: Object.keys(VCS).map(k => `${k}-initial`) },
    { title: '# Board Discussion', keys: Object.keys(VCS).map(k => `${k}-discuss`) },
  ];
  const parts = [];
  for (const { title, keys } of sections) {
    const entries = keys.map(k => cardMd[k]).filter(Boolean);
    if (entries.length) parts.push(title + '\n\n' + entries.join('\n\n---\n\n'));
  }
  navigator.clipboard.writeText(parts.join('\n\n---\n\n')).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!`;
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

// ── VC metadata (mirrors vcs.py VC_DISPLAY) ──────────────────────────
const VCS = {
  vinod: { name: "Vinod Khosla",  firm: "Khosla Ventures",       color: "#D97706", bg: "#FFFBEB", border: "#FCD34D", text: "#78350F" },
  doug:  { name: "Doug Leone",    firm: "Sequoia Capital",        color: "#DC2626", bg: "#FEF2F2", border: "#FCA5A5", text: "#7F1D1D" },
  ben:   { name: "Ben Horowitz",  firm: "Andreessen Horowitz",    color: "#475569", bg: "#F8FAFC", border: "#CBD5E1", text: "#1E293B" },
  peter: { name: "Peter Thiel",   firm: "Founders Fund",          color: "#4F46E5", bg: "#EEF2FF", border: "#A5B4FC", text: "#1E1B4B" },
  pat:   { name: "Pat Grady",     firm: "Sequoia Capital",        color: "#059669", bg: "#ECFDF5", border: "#6EE7B7", text: "#064E3B" },
};

function vcHeader(key, label, mdKey) {
  const vc = VCS[key];
  const copyBtn = mdKey ? `
    <button class="copy-btn no-print p-1 rounded hover:bg-black/10 transition-colors" title="Copy"
      onclick="copyText(cardMd['${mdKey}'], this)">
      <svg class="w-3.5 h-3.5" style="color:${vc.text}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
      </svg>
    </button>` : '';
  return `
    <div class="flex items-center justify-between">
      <div>
        <div class="font-semibold text-sm" style="color:${vc.color}">${vc.name}</div>
        <div class="text-xs text-slate-400">${vc.firm}</div>
      </div>
      <div class="flex items-center gap-2">
        ${copyBtn}
        <span class="text-xs font-medium px-2 py-0.5 rounded-full" style="background:${vc.bg};color:${vc.text};border:1px solid ${vc.border}">${label}</span>
      </div>
    </div>
  `;
}

function loadingCard(key, label) {
  const vc = VCS[key];
  return `
    ${vcHeader(key, label)}
    <div class="flex items-center gap-2 text-slate-400 text-sm">
      <span class="pulse-dot w-2 h-2 rounded-full inline-block" style="background:${vc.color}"></span>
      Thinking…
    </div>
  `;
}

function show(id) {
  document.getElementById(id).classList.remove('hidden');
}

// ── File helpers ──────────────────────────────────────────────────────
let selectedFiles = [];

function fileSelected(input) {
  Array.from(input.files).forEach(f => selectedFiles.push(f));
  input.value = '';
  renderFileBadges();
}

function removeFile(index) {
  selectedFiles.splice(index, 1);
  renderFileBadges();
}

function renderFileBadges() {
  const container = document.getElementById('file-badges');
  container.innerHTML = selectedFiles.map((f, i) => `
    <div class="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-full text-xs font-medium">
      <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>${f.name}</span>
      <button onclick="removeFile(${i})" class="ml-1 hover:text-red-500 font-bold leading-none">×</button>
    </div>
  `).join('');
}

// ── Main logic ────────────────────────────────────────────────────────
async function askVCs() {
  const qEl  = document.getElementById('q');
  const btn  = document.getElementById('submit-btn');
  const question = qEl.value.trim();
  if (!question) { qEl.focus(); return; }

  btn.disabled = true;
  btn.textContent = 'Processing…';
  document.getElementById('phase-badge').style.display = 'flex';

  currentQuestion = question;
  currentFileNames = selectedFiles.map(f => f.name);
  takes = {};
  responses = {};
  currentActiveId = null;

  ['sec-initial', 'sec-discuss'].forEach(id =>
    document.getElementById(id).classList.add('hidden')
  );
  document.getElementById('result-toolbar').classList.add('hidden');
  document.getElementById('result-toolbar').classList.remove('flex');
  Object.keys(cardMd).forEach(k => delete cardMd[k]);

  // Pre-populate loading cards
  show('sec-initial');
  for (const key of Object.keys(VCS)) {
    document.getElementById(`card-${key}-initial`).innerHTML  = loadingCard(key, 'Initial Take');
    document.getElementById(`card-${key}-discuss`).innerHTML  = '';
  }

  try {
    const formData = new FormData();
    formData.append('question', question);
    selectedFiles.forEach(f => formData.append('files', f));

    const resp = await fetch('/api/ask', { method: 'POST', body: formData });
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.trim()) continue;
        const lines = part.split('\n');
        const eventLine = lines.find(l => l.startsWith('event:'));
        const dataLine  = lines.find(l => l.startsWith('data:'));
        if (!eventLine || !dataLine) continue;

        const event = eventLine.slice(6).trim();
        let data;
        try { data = JSON.parse(dataLine.slice(5).trim()); } catch { continue; }

        if (event === 'phase') {
          document.getElementById('phase-text').textContent = data.message;
          if (data.phase === 'discussion') {
            show('sec-discuss');
            for (const key of Object.keys(VCS)) {
              document.getElementById(`card-${key}-discuss`).innerHTML = loadingCard(key, 'Response');
            }
          }
        } else if (event === 'vc_take') {
          takes[data.vc] = data.answer;
          const mdKey = `${data.vc}-initial`;
          cardMd[mdKey] = `**${VCS[data.vc].name} (${VCS[data.vc].firm}) — Initial Take**\n\n${data.answer}`;
          const card = document.getElementById(`card-${data.vc}-initial`);
          card.innerHTML = vcHeader(data.vc, 'Initial Take', mdKey) +
            `<div class="prose">${marked.parse(data.answer)}</div>`;
        } else if (event === 'vc_response') {
          responses[data.vc] = data.response;
          const mdKey = `${data.vc}-discuss`;
          cardMd[mdKey] = `**${VCS[data.vc].name} (${VCS[data.vc].firm}) — Response**\n\n${data.response}`;
          const card = document.getElementById(`card-${data.vc}-discuss`);
          card.innerHTML = vcHeader(data.vc, 'Response', mdKey) +
            `<div class="prose">${marked.parse(data.response)}</div>`;
        } else if (event === 'error') {
          alert('Error: ' + data.message);
        } else if (event === 'done') {
          saveSession();
          document.getElementById('phase-badge').style.display = 'none';
          document.getElementById('result-toolbar').classList.remove('hidden');
          document.getElementById('result-toolbar').classList.add('flex');
          btn.disabled = false;
          btn.innerHTML = 'Ask the VCs <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>';
        }
      }
    }
  } catch (err) {
    alert('Request failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Ask the VCs';
    document.getElementById('phase-badge').style.display = 'none';
  }
}

// Submit on Cmd+Enter / Ctrl+Enter
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') askVCs();
});

// ── History ──────────────────────────────────────────────────────────
const HISTORY_KEY = 'aivc_history';
const MAX_SESSIONS = 100;

function saveSession() {
  if (!currentQuestion) return;
  const sessions = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const session = {
    id: String(Date.now()),
    timestamp: Date.now(),
    question: currentQuestion,
    fileNames: currentFileNames,
    takes: { ...takes },
    responses: { ...responses },
  };
  sessions.unshift(session);
  if (sessions.length > MAX_SESSIONS) sessions.splice(MAX_SESSIONS);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(sessions));
  currentActiveId = session.id;
  renderHistory(session.id);
}

function renderHistory(activeId) {
  const sessions = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const list = document.getElementById('history-list');
  if (!sessions.length) {
    list.innerHTML = '<p style="color:#3d6b4a;font-size:12px;padding:16px 14px;">No history yet</p>';
    return;
  }
  const now = Date.now();
  const groups = [
    { label: 'Today',       fn: s => (now - s.timestamp) < 86400000 },
    { label: 'Yesterday',   fn: s => (now - s.timestamp) >= 86400000 && (now - s.timestamp) < 172800000 },
    { label: 'Last 7 days', fn: s => (now - s.timestamp) >= 172800000 && (now - s.timestamp) < 604800000 },
    { label: 'Older',       fn: s => (now - s.timestamp) >= 604800000 },
  ];
  let html = '';
  for (const g of groups) {
    const items = sessions.filter(g.fn);
    if (!items.length) continue;
    html += `<div class="history-date-group">${g.label}</div>`;
    for (const s of items) {
      const label = s.question.length > 52 ? s.question.slice(0, 52) + '…' : s.question;
      const active = s.id === (activeId || currentActiveId) ? ' active' : '';
      html += `<div class="history-item${active}" onclick="restoreSession('${s.id}')">
        <span class="item-text">${label}</span>
        <button class="history-del" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete">×</button>
      </div>`;
    }
  }
  list.innerHTML = html;
}

function restoreSession(id) {
  const sessions = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  currentActiveId = id;
  currentQuestion = s.question;
  currentFileNames = s.fileNames || [];
  takes = { ...s.takes };
  responses = { ...s.responses };

  document.getElementById('q').value = s.question;
  document.getElementById('phase-badge').style.display = 'none';

  // Rebuild cardMd and clear previous
  Object.keys(cardMd).forEach(k => delete cardMd[k]);

  // File name badges (read-only)
  selectedFiles = [];
  const badges = document.getElementById('file-badges');
  badges.innerHTML = (s.fileNames || []).map(name => `
    <div class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium" style="background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;opacity:0.7;">
      <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span>${name}</span>
    </div>`).join('');

  // Render Round 1
  show('sec-initial');
  for (const key of Object.keys(VCS)) {
    const card = document.getElementById(`card-${key}-initial`);
    const rawAnswer = s.takes[key];
    if (rawAnswer) {
      const mdKey = `${key}-initial`;
      cardMd[mdKey] = `**${VCS[key].name} (${VCS[key].firm}) — Initial Take**\n\n${rawAnswer}`;
      card.innerHTML = vcHeader(key, 'Initial Take', mdKey) + `<div class="prose">${marked.parse(rawAnswer)}</div>`;
    } else { card.innerHTML = ''; }
  }

  // Render Round 2
  show('sec-discuss');
  for (const key of Object.keys(VCS)) {
    const card = document.getElementById(`card-${key}-discuss`);
    const rawResponse = s.responses[key];
    if (rawResponse) {
      const mdKey = `${key}-discuss`;
      cardMd[mdKey] = `**${VCS[key].name} (${VCS[key].firm}) — Response**\n\n${rawResponse}`;
      card.innerHTML = vcHeader(key, 'Response', mdKey) + `<div class="prose">${marked.parse(rawResponse)}</div>`;
    } else { card.innerHTML = ''; }
  }

  document.getElementById('result-toolbar').classList.remove('hidden');
  document.getElementById('result-toolbar').classList.add('flex');
  renderHistory(id);
}

function deleteSession(id) {
  const sessions = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  const idx = sessions.findIndex(s => s.id === id);
  if (idx !== -1) sessions.splice(idx, 1);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(sessions));
  if (currentActiveId === id) newChat();
  else renderHistory();
}

function newChat() {
  document.getElementById('q').value = '';
  selectedFiles = [];
  renderFileBadges();
  ['sec-initial', 'sec-discuss'].forEach(id =>
    document.getElementById(id).classList.add('hidden')
  );
  document.getElementById('result-toolbar').classList.add('hidden');
  document.getElementById('result-toolbar').classList.remove('flex');
  document.getElementById('phase-badge').style.display = 'none';
  Object.keys(cardMd).forEach(k => delete cardMd[k]);
  takes = {};
  responses = {};
  currentQuestion = '';
  currentFileNames = [];
  currentActiveId = null;
  renderHistory();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// Initialise sidebar on load
renderHistory();
</script>
</body>
</html>
